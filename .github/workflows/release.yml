name: Build/Release muStream

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            build_cmd: npm run build:mac
            artifact_glob: "dist_app/*.dmg\ndist_app/*.zip"
          - os: ubuntu-latest
            build_cmd: npm run build:linux
            artifact_glob: "dist_app/*.AppImage\ndist_app/*.deb"
          - os: windows-latest
            build_cmd: npm run build:win
            artifact_glob: "dist_app/*.exe"

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Linux Build Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3 libudev-dev libsecret-1-dev

      - name: Install Windows Build Dependencies
        if: matrix.os == 'windows-latest'
        run: |
          npm install --global windows-build-tools --vs2019 || true
        shell: pwsh

      - name: Install Dependencies
        run: npm install

      - name: Rebuild native modules for Electron
        run: npx @electron/rebuild
        shell: bash

      - name: Build App
        run: ${{ matrix.build_cmd }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_glob }}
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false
